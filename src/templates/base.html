<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}深圳市出租车出行行为分析系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="{{ url_for('static', filename='js/echarts/shine.js') }}"></script>
</head>
<body>
    <div class="header">
        <h1>🚕 深圳市出租车出行行为分析系统</h1>
        <p>基于GPS轨迹数据的城市出行规律挖掘 | 500辆出租车 × 全天候轨迹</p>
    </div>

    <nav class="nav-tabs">
        <a href="/"         class="nav-tab {% if request.path == '/' %}active{% endif %}">📊 分析看板</a>
        <a href="/realtime" class="nav-tab {% if request.path == '/realtime' %}active{% endif %}">🖥 实时大屏</a>
    </nav>

    {% block content %}{% endblock %}

    <div class="footer">
        © 2026 城市出行数据分析项目组 | Python + Flask + ECharts | shine 主题
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
